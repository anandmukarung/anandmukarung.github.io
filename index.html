                <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 4, background: nowAccentColors[i % 4] }} />
                <div style={s.nowLabel}>{n.label}</div>
                <div style={s.nowValue}>{n.value}</div>
              </div>
            ))}
          </div>
        </section>

        {/* PROJECTS */}
        <section style={s.section} id="work">
          <div style={s.sectionHead}>
            <div>
              <span style={s.sTag}>03 / SELECTED WORK</span>
              <h2 style={s.sTitle}>Things I've shipped.</h2>
            </div>
            <div style={s.sCount}>4 / 12 shown</div>
          </div>
          <div>
            {D.projects.map((p, i) => {
              const open = openProject === i;
              const hovered = hoverProj === i;
              return (
                <div
                  key={i}
                  style={{ ...s.projectItem, background: hovered && !open ? 'var(--bg-2)' : 'transparent' }}
                  onMouseEnter={() => setHoverProj(i)}
                  onMouseLeave={() => setHoverProj(null)}
                >
                  <div style={s.projectHead} onClick={() => setOpenProject(open ? -1 : i)}>
                    <div style={s.projectN}>→ PRJ_{p.n}</div>
                    <div>
                      <div style={{ ...s.projectTitle, color: hovered || open ? 'var(--lime)' : 'var(--ink)', transition: 'color .2s' }}>
                        {p.title}
                      </div>
                      <div style={s.projectKicker}>// {p.kicker} · {p.year}</div>
                    </div>
                    <div style={s.projectTags}>
                      {p.stack.slice(0, 3).map(t => <span key={t} style={s.tag}>{t}</span>)}
                    </div>
                    <div style={{ ...s.plus, background: open ? 'var(--lime)' : 'transparent', color: open ? '#000' : 'var(--ink)', transform: open ? 'rotate(45deg)' : 'rotate(0)' }}>+</div>
                  </div>
                  {open && (
                    <div style={s.projectBody} className="reveal">
                      <div style={s.projectBodyLeft}>
                        <Placeholder label={`[ ${p.title.toLowerCase()} — screens ]`} ratio="4/3" tone="dark" />
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 16 }}>
                          {p.stack.map(t => <span key={t} style={s.tag}>{t}</span>)}
                        </div>
                        <div style={{ marginTop: 16, fontFamily: 'JetBrains Mono, monospace', fontSize: 12, color: 'var(--blue)' }}>
                          ↗ {p.link}
                        </div>
                      </div>
                      <div>
                        <div style={s.projectBlurb}>{p.blurb}</div>
                        <div style={s.projectLong}>{p.long}</div>
                        <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase', color: 'var(--ink-soft)', marginBottom: 8 }}>
                          WINS
                        </div>
                        <ul style={s.winList}>
                          {p.wins.map((w, j) => (
                            <li key={j} style={s.winItem}>
                              <span style={s.winArrow}>→</span>
                              <span>{w}</span>
                            </li>
                          ))}
                        </ul>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
            <div style={{ borderTop: '1px solid var(--line)' }} />
          </div>
        </section>

        {/* EXPERIENCE */}
        <section style={s.section}>
          <div style={s.sectionHead}>
            <div>
              <span style={s.sTag}>04 / EXPERIENCE</span>
              <h2 style={s.sTitle}>Where I've worked.</h2>
            </div>
            <div style={s.sCount}>3.5 years</div>
          </div>
          <div>
            {D.experience.map((e, i) => (
              <div key={i} style={s.expItem}>
                <div>
                  <div style={s.expWhen}>{e.when}</div>
                  <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 12, color: 'var(--ink-soft)', marginTop: 6 }}>{e.where}</div>
                </div>
                <div>
                  <h3 style={s.expOrgLine}>{e.org}</h3>
                  <div style={s.expRole}>{e.role}</div>
                  {e.bullets.map((b, j) => (
                    <p key={j} style={s.expBullet}>
                      <span style={{ position: 'absolute', left: 0, color: 'var(--magenta)' }}>▸</span>{b}
                    </p>
                  ))}
                </div>
              </div>
            ))}
            <div style={{ borderTop: '1px solid var(--line)' }} />
          </div>
        </section>

        {/* SKILLS */}
        <section style={s.section}>
          <div style={s.sectionHead}>
            <div>
              <span style={s.sTag}>05 / STACK</span>
              <h2 style={s.sTitle}>Tools I reach for.</h2>
            </div>
            <div style={s.sCount}>daily drivers</div>
          </div>
          <div style={s.skillsBlock}>
            {Object.entries(D.skills).map(([cat, items]) => (
              <div key={cat} style={s.skillCell}>
                <div style={s.skillHead}>{cat}</div>
                {items.map(sk => <div key={sk} style={s.skillItem}>{sk}</div>)}
              </div>
            ))}
          </div>
        </section>

        {/* ARCHIVE */}
        <section style={s.section} id="archive">
          <div style={s.sectionHead}>
            <div>
              <span style={s.sTag}>06 / ARCHIVE</span>
              <h2 style={s.sTitle}>Smaller things.</h2>
            </div>
            <div style={s.sCount}>{D.archive.length} items</div>
          </div>
          <div style={s.archiveTable}>
            <div style={s.archiveHead}>
              <div>Year</div><div>Project</div><div>Note</div><div style={{ textAlign: 'right' }}>Stack</div>
            </div>
            {D.archive.map((a, i) => (
              <div key={i} style={s.archiveRow}>
                <div style={s.archiveYear}>{a.year}</div>
                <div style={s.archiveTitle}>{a.title}</div>
                <div style={s.archiveNote}>{a.note}</div>
                <div style={s.archiveStack}>{a.stack}</div>
              </div>
            ))}
          </div>
        </section>

        {/* OSS */}
        <section style={s.section}>
          <div style={s.sectionHead}>
            <div>
              <span style={s.sTag}>07 / OPEN SOURCE</span>
              <h2 style={s.sTitle}>Small PRs, big repos.</h2>
            </div>
            <div style={s.sCount}>{D.oss.length} merged</div>
          </div>
          <div style={s.ossGrid}>
            {D.oss.map((o, i) => (
              <div key={i} style={s.ossCard}>
                <div style={s.ossRepo}>{o.repo}</div>
                <div style={s.ossWhat}>{o.what}</div>
                <div style={s.ossStars}>★ {o.stars} · merged</div>
              </div>
            ))}
          </div>
        </section>

        {/* CONTACT */}
        <section style={s.contactBlock} id="contact">
          <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 12, letterSpacing: '0.2em', textTransform: 'uppercase', marginBottom: 20 }}>
            08 / CONTACT — say hi
          </div>
          <h2 style={s.contactBig}>let's<br />build something.</h2>
          <div style={s.contactLinks}>
            <a href={`mailto:${D.email}`} style={s.contactLink}>✉ {D.email}</a>
            <a href={`https://${D.github}`} style={s.contactLink}>◆ {D.github}</a>
            <a href={`https://${D.linkedin}`} style={s.contactLink}>◆ {D.linkedin}</a>
            <a href={D.resume} style={{ ...s.contactLink, background: '#fff', color: '#000' }}>⤓ resume.pdf</a>
          </div>
          <div style={{ marginTop: 48, fontFamily: 'JetBrains Mono, monospace', fontSize: 11, opacity: 0.7 }}>
            © 2026 Anand Rai · Set in Space Grotesk &amp; JetBrains Mono
          </div>
        </section>

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
