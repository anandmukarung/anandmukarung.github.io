  const fg = tone === 'dark' ? 'oklch(0.7 0.02 85)' : 'oklch(0.48 0.02 60)';
  const stripe = tone === 'dark' ? 'oklch(0.32 0.02 260)' : 'oklch(0.88 0.02 80)';
  return (
    <div style={{
      aspectRatio: ratio,
      background: `repeating-linear-gradient(135deg, ${bg} 0 10px, ${stripe} 10px 11px)`,
      borderRadius: 6,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      color: fg, fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: 0.5,
    }}>
      {label}
    </div>
  );
}

              <div style={s.statBox}><div style={s.statN}>2+</div><div style={s.statLabel}>Yrs SWE</div></div>
              <div style={s.statBox}><div style={s.statN}>3</div><div style={s.statLabel}>Internships</div></div>
              <div style={s.statBox}><div style={s.statN}>50%</div><div style={s.statLabel}>Latency cut</div></div>
              <div style={s.statBox}><div style={s.statN}>87%</div><div style={s.statLabel}>LLM acc.</div></div>
            </div>
          </aside>
        </header>

        <section style={s.section} id="work">
          <div style={s.sectionHead}>
            <div><span style={s.sTag}>01 / SELECTED WORK</span><h2 style={s.sTitle}>Things I've shipped.</h2></div>
            <div style={s.sCount}>{D.projects.length} projects · click to expand</div>
          </div>

          <div style={s.projectList}>
            {D.projects.map((p, i) => {
              const open = openProject === i;
              const hovered = hoverProj === i;
              return (
                <div key={i} style={{...s.projectCard, ...(open ? s.projectCardOpen : {}), transform: hovered && !open ? 'translateY(-2px)' : 'none'}} onMouseEnter={() => setHoverProj(i)} onMouseLeave={() => setHoverProj(null)}>
                  <div style={s.projectHead} onClick={() => setOpenProject(open ? -1 : i)}>
                    <div style={s.projectN}>→ PRJ_{p.n}</div>
                    <div>
                      <div style={{...s.projectTitle, color: hovered || open ? 'var(--lime)' : 'var(--ink)', transition: 'color .2s'}}>{p.title}</div>
                      <div style={s.projectKicker}>// {p.kicker} · {p.year}</div>
                    </div>
                    <div style={s.projectTags}>
                      {p.stack.slice(0, 4).map((st, j) => <span key={st} style={j === 0 ? s.tagHL : s.tag}>{st}</span>)}
                    </div>
                    <div style={{...s.plus, background: open ? 'var(--lime)' : 'transparent', color: open ? '#000' : 'var(--ink)', transform: open ? 'rotate(45deg)' : 'rotate(0)'}}>+</div>
                  </div>

                  {open && (
                    <div style={s.projectBody} className="reveal">
                      <div>
                        <div style={s.projectBlurb}>{p.blurb}</div>
                        <div style={s.projectLong}>{p.long}</div>
                        <div style={{fontFamily:'JetBrains Mono, monospace', fontSize: 11, letterSpacing:'0.2em', textTransform:'uppercase', color:'var(--ink-soft)', marginBottom: 4}}>WINS</div>
                        <ul style={s.winList}>
                          {p.wins.map((w, j) => <li key={j} style={s.winItem}><span style={s.winArrow}>→</span><span>{w}</span></li>)}
                        </ul>
                      </div>

                      <div style={s.projectRight}>
                        <Placeholder label={`[ ${p.title.toLowerCase()} — screenshot ]`} ratio="4/3" tone="dark" />
                        <div>
                          <div style={{fontFamily:'JetBrains Mono, monospace', fontSize: 10, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--ink-soft)', marginBottom: 8}}>Stack</div>
                          <div style={{display:'flex', flexWrap:'wrap', gap: 6}}>{p.stack.map(st => <span key={st} style={s.tag}>{st}</span>)}</div>
                        </div>
                        <div>
                          <div style={{fontFamily:'JetBrains Mono, monospace', fontSize: 10, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--ink-soft)', marginBottom: 8}}>Links</div>
                          <div style={s.projectLinks}>
                            {p.live && <a style={s.linkChip} href={`https://${p.live}`}>↗ live · {p.live}</a>}
                            {p.repo && <a style={s.linkChip} href={`https://${p.repo}`}>◆ repo · {p.repo}</a>}
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </section>

        <section style={s.section} id="about">
          <div style={s.sectionHead}>
            <div><span style={s.sTag}>02 / ABOUT</span><h2 style={s.sTitle}>Short version.</h2></div>
            <div style={s.sCount}>background + principles</div>
          </div>

          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap: 48, marginBottom: 40}}>
            <div style={{fontSize: 18, lineHeight: 1.6, color: 'var(--ink)'}}>
              {D.about.map((p, i) => <p key={i} style={{margin: '0 0 18px'}}>{p}</p>)}
            </div>
            <div style={{fontSize: 15.5, lineHeight: 1.65, color: 'var(--ink-soft)'}}>
              <div style={{fontFamily:'JetBrains Mono, monospace', fontSize: 11, letterSpacing:'0.2em', textTransform:'uppercase', color:'var(--lime)', marginBottom: 16}}>How I work</div>
              <p style={{margin: '0 0 14px'}}>Most comfortable in <b style={{color:'var(--ink)'}}>Python, TypeScript, and Java</b> — across React/Next frontends, FastAPI/Spring backends, and AWS infra (Lambda, API Gateway, DynamoDB).</p>
              <p style={{margin: '0 0 14px'}}>Strongest when the work involves <b style={{color:'var(--ink)'}}>load testing, debugging, and tightening an existing codebase</b>. That's where I added the most value at DTN and Amazon.</p>
              <p style={{margin: 0}}>Actively investing in <b style={{color:'var(--ink)'}}>distributed systems and backend depth</b> — my reading and side projects both lean that way right now.</p>
            </div>
          </div>

          <div style={s.principlesWrap}>
            <div style={s.princHead}>
              <span style={s.princN}>Principles · {curP.n} of {String(D.principles.length).padStart(2, '0')}</span>
              <span>auto · 5s</span>
            </div>
            <div>
              <h3 key={`t-${principleIdx}`} style={s.princTitle} className="reveal">{curP.title}</h3>
              <p key={`b-${principleIdx}`} style={s.princBody} className="reveal">{curP.body}</p>
            </div>
            <div style={s.princControls}>
              {D.principles.map((_, i) => <button key={i} aria-label={`principle ${i+1}`} style={s.princDot(i === principleIdx)} onClick={() => setPrincipleIdx(i)} />)}
              <button style={s.princArrow} onClick={() => setPrincipleIdx(i => (i - 1 + D.principles.length) % D.principles.length)} aria-label="previous">←</button>
              <button style={{...s.princArrow, marginLeft: 8}} onClick={() => setPrincipleIdx(i => (i + 1) % D.principles.length)} aria-label="next">→</button>
            </div>
          </div>
        </section>

        <section style={s.section}>
          <div style={s.sectionHead}>
            <div><span style={s.sTag}>03 / NOW</span><h2 style={s.sTitle}>Where I'm at.</h2></div>
            <div style={s.sCount}>April 2026</div>
          </div>
          <div style={s.nowGrid}>
            {D.now.map((n, i) => <div key={i} style={s.nowCard}><div style={s.nowCardAccent(i)} /><div style={s.nowLabel}>{n.label}</div><div style={s.nowValue}>{n.value}</div></div>)}
          </div>
        </section>

        <section style={s.section}>
          <div style={s.sectionHead}>
            <div><span style={s.sTag}>04 / EXPERIENCE</span><h2 style={s.sTitle}>Where I've worked.</h2></div>
            <div style={s.sCount}>2+ years · {D.experience.length} roles</div>
          </div>
          <div>
            {D.experience.map((e, i) => (
              <div key={i} style={s.expItem}>
                <div><div style={s.expWhen}>{e.when}</div><div style={{fontFamily:'JetBrains Mono, monospace', fontSize: 12, color:'var(--ink-soft)', marginTop: 6}}>{e.where}</div></div>
                <div><h3 style={s.expOrgLine}>{e.org}</h3><div style={s.expRole}>{e.role}</div>{e.bullets.map((b, j) => <p key={j} style={s.expBullet}><span style={{position:'absolute', left: 0, color:'var(--magenta)'}}>▸</span>{b}</p>)}</div>
              </div>
            ))}
            <div style={{borderTop: '1px solid var(--line)'}} />
          </div>
        </section>

        <section style={s.section}>
          <div style={s.sectionHead}>
            <div><span style={s.sTag}>05 / STACK</span><h2 style={s.sTitle}>Tools I reach for.</h2></div>
            <div style={s.sCount}>daily drivers</div>
          </div>
          <div style={s.skillsBlock}>
            {Object.entries(D.skills).map(([cat, items]) => (
              <div key={cat} style={s.skillCell}>
                <div style={s.skillHead}>{cat}</div>
                {items.map(sk => <div key={sk} style={s.skillItem}>{sk}</div>)}
              </div>
            ))}
          </div>
        </section>

        <section style={s.contactBlock} id="contact">
          <div style={{fontFamily:'JetBrains Mono, monospace', fontSize: 12, letterSpacing: '0.2em', textTransform:'uppercase', marginBottom: 20}}>06 / CONTACT — say hi</div>
          <h2 style={s.contactBig}>let's<br/>build something.</h2>
          <div style={s.contactLinks}>
            <a href={`mailto:${D.email}`} style={s.contactLink}>✉ {D.email}</a>
            <a href={`https://${D.github}`} style={s.contactLink}>◆ {D.github}</a>
            <a href={`https://${D.linkedin}`} style={s.contactLink}>◆ {D.linkedin}</a>
            <a href={D.resume} style={{...s.contactLink, background:'#fff', color:'#000'}}>⤓ resume.pdf</a>
          </div>
          <div style={{marginTop: 48, fontFamily:'JetBrains Mono, monospace', fontSize: 11, opacity: 0.7}}>© 2026 Anand Rai · Set in Space Grotesk & JetBrains Mono</div>
        </section>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
